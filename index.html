<style>

border-radius:10px;

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;

font-size:15px;
}

button{
padding:12px 20px;
margin-top:10px;
border:none;
border-radius:6px;

color:white;
font-size:15px;
cursor:pointer;
width:100%;
}

button.secondary{
background:#777;
}

<button onclick="changeReview()" class="secondary">
