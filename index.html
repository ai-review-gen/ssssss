<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:90%;
max-width:450px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
font-size:15px;
}

button{
padding:12px 20px;
margin-top:10px;
border:none;
border-radius:6px;
background:#4285F4;
color:white;
font-size:15px;
cursor:pointer;
width:100%;
}

button.secondary{
background:#777;
}

</style>
</head>

<body>

<div class="container">

<h2>Share Your Experience ⭐</h2>

<textarea id="reviewBox"></textarea>

<button onclick="changeReview()" class="secondary">
Change Review
</button>

<button onclick="leaveReview()">
Leave Google Review
</button>

</div>

<script>

const reviews = [

"Very professional staff and excellent service, really loved the haircut and styling here",
"Great salon experience with friendly staff and clean environment, highly recommended",
"Best place for haircut and grooming, staff is very skilled and polite",
"Really satisfied with the service, they pay attention to every small detail",
"Nice ambience and professional team, my haircut turned out exactly how I wanted",
"Affordable prices with great quality service, will definitely visit again",
"Staff is very cooperative and experienced, overall a wonderful experience",
"Clean salon with modern equipment and very talented hairstylists",
"Excellent customer service and amazing hair styling, totally worth it",
"One of the best salons in the area, very professional and hygienic",
"Very relaxing experience and great results, highly impressed with the service",
"Professional staff and quick service, really happy with my haircut",
"Nice atmosphere and very skilled barbers, great place for grooming",
"Highly satisfied with the service, staff is friendly and welcoming",
"Great attention to detail and very professional approach, loved the service"

];

function randomReview(){

const index = Math.floor(Math.random() * reviews.length);

document.getElementById("reviewBox").value = reviews[index];

}

function changeReview(){

randomReview();

}

}

randomReview();

</script>

</body>

</html>
