<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leave a Review</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.container{
background:white;
padding:25px;
border-radius:10px;
width:90%;
max-width:450px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
text-align:center;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
font-size:15px;
}

button{
padding:12px 20px;
margin-top:10px;
border:none;
border-radius:6px;
background:#4285F4;
color:white;
font-size:15px;
cursor:pointer;
width:100%;
}

button.secondary{
background:#777;
}

</style>
</head>

<body>

<div class="container">

<h2>Share Your Experience ⭐</h2>

<textarea id="reviewBox"></textarea>

<button onclick="changeReview()" class="secondary">
Change Review
</button>

<button onclick="leaveReview()">
Copy & Leave Google Review
</button>

</div>

"Very professional and the quality was excellent. I really liked the experience.",

"Good service, affordable price and helpful staff.",

"One of the best businesses in this area. I would definitely recommend it.",

"Very smooth experience and great customer support."

];

function randomReview(){

const index = Math.floor(Math.random() * reviews.length);

document.getElementById("reviewBox").value = reviews[index];

}

function changeReview(){

randomReview();

</script>

</body>


</html>
